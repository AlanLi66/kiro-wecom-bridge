<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alan Bot Dashboard</title>
<style>
:root {
  --bg: #0f1117;
  --card: #1a1d27;
  --border: #2a2d3a;
  --text: #e4e4e7;
  --text-dim: #8b8d97;
  --accent: #6366f1;
  --green: #22c55e;
  --yellow: #eab308;
  --red: #ef4444;
  --blue: #3b82f6;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 24px;
}
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}
.header h1 {
  font-size: 24px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header .status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
}
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 16px;
}
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
}
.card-title {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.card-title .icon { font-size: 16px; }
.metric-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.metric {
  flex: 1;
  min-width: 80px;
}
.metric-value {
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
}
.metric-label {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 2px;
}
.metric-value.green { color: var(--green); }
.metric-value.yellow { color: var(--yellow); }
.metric-value.red { color: var(--red); }
.metric-value.blue { color: var(--blue); }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 8px 6px;
  color: var(--text-dim);
  font-weight: 500;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 8px 6px;
  border-bottom: 1px solid var(--border);
}
tr:last-child td { border-bottom: none; }
.badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 500;
}
.badge-green { background: rgba(34,197,94,0.15); color: var(--green); }
.badge-yellow { background: rgba(234,179,8,0.15); color: var(--yellow); }
.badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
.badge-blue { background: rgba(59,130,246,0.15); color: var(--blue); }
.badge-gray { background: rgba(139,141,151,0.15); color: var(--text-dim); }
.progress-bar {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 8px;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s ease;
}
.hour-chart {
  display: flex;
  align-items: flex-end;
  gap: 2px;
  height: 60px;
  margin-top: 12px;
}
.hour-bar {
  flex: 1;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
  min-width: 4px;
  opacity: 0.7;
  transition: opacity 0.2s;
}
.hour-bar:hover { opacity: 1; }
.refresh-btn {
  background: var(--accent);
  border: none;
  color: white;
  padding: 6px 14px;
  border-radius: 6px;
  font-size: 13px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.refresh-btn:hover { opacity: 0.85; }
.loading {
  text-align: center;
  padding: 40px;
  color: var(--text-dim);
}
.error-msg {
  color: var(--red);
  font-size: 13px;
  padding: 8px;
}
/* Tooltip */
.tip {
  position: relative;
  cursor: help;
  border-bottom: 1px dashed var(--text-dim);
}
.tip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 0;
  background: #2d3040;
  color: var(--text);
  font-size: 12px;
  font-weight: 400;
  padding: 10px 14px;
  border-radius: 8px;
  width: max-content;
  max-width: 280px;
  line-height: 1.6;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 1000;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
  text-transform: none;
  letter-spacing: 0;
}
.tip:hover::after { opacity: 1; }
.tip:hover::after { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <h1>🤖 Alan Bot Dashboard</h1>
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="lastUpdate">加载中...</span>
    <button class="refresh-btn" onclick="refresh()">刷新</button>
  </div>
</div>

<div class="grid" id="dashboard">
  <div class="loading">正在加载看板数据...</div>
</div>

<script>
const API_BASE = window.location.origin;
let data = null;

async function fetchData() {
  try {
    const resp = await fetch(`${API_BASE}/dashboard/api`);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    data = await resp.json();
    render();
    document.getElementById('lastUpdate').textContent = `更新于 ${data.generated_at.split('T').pop() || data.generated_at.split(' ').pop()}`;
    document.getElementById('statusDot').style.background = '#22c55e';
  } catch (e) {
    document.getElementById('dashboard').innerHTML = `<div class="error-msg">❌ 加载失败: ${e.message}</div>`;
    document.getElementById('statusDot').style.background = '#ef4444';
  }
}

function render() {
  if (!data) return;
  const html = [
    renderSystemCard(),
    renderProcessPoolCard(),
    renderChatStatsCard(),
    renderDebateCard(),
    renderCronTasksCard(),
    renderScanResultsCard(),
    renderZentaoCard(),
    renderMemoryCard(),
  ].join('');
  document.getElementById('dashboard').innerHTML = html;
}

function renderSystemCard() {
  const s = data.system;
  return `
    <div class="card">
      <div class="card-title"><span class="icon">💻</span> <span class="tip" data-tip="kiro-wecom-bridge 服务运行在 WSL2 Ubuntu 中，通过 systemd 托管">系统状态</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value blue">${s.platform || 'N/A'}</div>
          <div class="metric-label">操作系统</div>
        </div>
        <div class="metric">
          <div class="metric-value">${s.python || 'N/A'}</div>
          <div class="metric-label">Python</div>
        </div>
        <div class="metric">
          <div class="metric-value">${s.uptime_hours ? s.uptime_hours + 'h' : 'N/A'}</div>
          <div class="metric-label"><span class="tip" data-tip="WSL 系统的运行时间（非 bridge 进程时间）">运行时间</span></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px">
        主机: ${s.hostname || 'N/A'} | 时间: ${s.time || 'N/A'}
      </div>
    </div>`;
}

function renderProcessPoolCard() {
  const pools = data.process_pool.pools;
  let rows = '';
  pools.forEach(pool => {
    pool.processes.forEach(p => {
      const status = p.alive ? '<span class="badge badge-green">运行中</span>' : '<span class="badge badge-red">已停止</span>';
      const idle = p.idle_seconds < 60 ? `${Math.round(p.idle_seconds)}s` : `${Math.round(p.idle_seconds/60)}m`;
      rows += `<tr><td>${p.chatid}</td><td>${status}</td><td>${idle}</td><td>${p.pid || '-'}</td></tr>`;
    });
  });
  const pool = pools[0] || { active_count: 0, warm_count: 0, max_procs: 10 };
  const usage = pool.active_count / pool.max_procs * 100;
  return `
    <div class="card">
      <div class="card-title"><span class="icon">⚡</span> <span class="tip" data-tip="每个企微用户对话会分配一个独立的 kiro-cli 进程，进程池管理这些进程的生命周期">进程池</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value ${pool.active_count >= pool.max_procs ? 'red' : 'green'}">${pool.active_count}</div>
          <div class="metric-label"><span class="tip" data-tip="当前正在服务用户的 kiro-cli 进程数，每个进程对应一个 chatid">活跃进程</span></div>
        </div>
        <div class="metric">
          <div class="metric-value blue">${pool.warm_count}</div>
          <div class="metric-label"><span class="tip" data-tip="预先启动的空闲进程，新用户消息进来时可以立即分配，无需等待冷启动（约 3-5 秒）">预热池</span></div>
        </div>
        <div class="metric">
          <div class="metric-value">${pool.max_procs}</div>
          <div class="metric-label"><span class="tip" data-tip="同时允许的最大活跃进程数，超出后会淘汰最久未使用的进程（LRU）">最大容量</span></div>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width:${usage}%;background:${usage > 80 ? 'var(--red)' : 'var(--accent)'}"></div>
      </div>
      ${rows ? `<table style="margin-top:12px"><tr><th>ChatID</th><th>状态</th><th>空闲</th><th>PID</th></tr>${rows}</table>` : '<div style="font-size:13px;color:var(--text-dim);margin-top:12px">暂无活跃进程</div>'}
    </div>`;
}

function renderChatStatsCard() {
  const s = data.chat_stats;
  // 小时图表
  let maxCount = Math.max(...(s.by_hour || []).map(h => h.count), 1);
  let bars = '';
  for (let i = 0; i < 24; i++) {
    const found = (s.by_hour || []).find(h => h.hour === i);
    const count = found ? found.count : 0;
    const height = count / maxCount * 100;
    bars += `<div class="hour-bar" style="height:${Math.max(height, 2)}%" title="${i}:00 - ${count}条"></div>`;
  }
  // 用户排行
  let userRows = (s.by_user || []).map((u, i) => {
    const maxU = s.by_user[0]?.count || 1;
    const pct = Math.round(u.count / maxU * 100);
    return `<tr>
      <td>${u.userid}</td>
      <td style="width:50%"><div style="background:var(--accent);height:6px;border-radius:3px;width:${pct}%;opacity:0.7"></div></td>
      <td style="text-align:right">${u.count}</td>
    </tr>`;
  }).join('');
  // 全部时间用户排行
  let userAllRows = (s.by_user_all || []).map((u, i) => {
    const maxU = s.by_user_all[0]?.count || 1;
    const pct = Math.round(u.count / maxU * 100);
    return `<tr>
      <td>${u.userid}</td>
      <td style="width:50%"><div style="background:var(--green);height:6px;border-radius:3px;width:${pct}%;opacity:0.7"></div></td>
      <td style="text-align:right">${u.count}</td>
    </tr>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-title"><span class="icon">💬</span> <span class="tip" data-tip="统计用户通过企微发送给 Bot 的消息数量（不含 Bot 回复和 cron 触发）">对话统计</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value green">${s.today}</div>
          <div class="metric-label">今日消息</div>
        </div>
        <div class="metric">
          <div class="metric-value blue">${s.week}</div>
          <div class="metric-label">本周消息</div>
        </div>
        <div class="metric">
          <div class="metric-value">${s.total}</div>
          <div class="metric-label"><span class="tip" data-tip="自 Bot 上线以来收到的所有用户消息总数">累计消息</span></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:12px">今日消息分布（按小时）</div>
      <div class="hour-chart">${bars}</div>
      ${userRows ? `
      <div style="font-size:12px;color:var(--text-dim);margin-top:16px">用户使用排行（本周）</div>
      <table style="margin-top:8px"><tr><th>用户</th><th></th><th style="text-align:right">次数</th></tr>${userRows}</table>
      ` : ''}
      ${userAllRows ? `
      <div style="font-size:12px;color:var(--text-dim);margin-top:16px">用户使用排行（累计）</div>
      <table style="margin-top:8px"><tr><th>用户</th><th></th><th style="text-align:right">次数</th></tr>${userAllRows}</table>
      ` : ''}
    </div>`;
}

function renderCronTasksCard() {
  const tasks = data.cron_tasks;
  const all = [...(tasks.crontab || []), ...(tasks.scheduler || [])];
  let rows = all.map(t => {
    const type = t.type === 'scheduler' ? '<span class="badge badge-blue" title="通过 Bridge API 管理的任务，触发后由 Agent 执行 prompt，消耗对话额度">Scheduler</span>' : '<span class="badge badge-gray" title="直接写在系统 crontab 中的任务，到时间直接执行脚本，不经过 Agent，零额度消耗">Crontab</span>';
    const enabled = t.type === 'scheduler' && t.enabled === false ? '<span class="badge badge-yellow">暂停</span>' : '';
    return `<tr><td>${t.schedule}</td><td>${t.label}</td><td>${type} ${enabled}</td></tr>`;
  }).join('');
  return `
    <div class="card">
      <div class="card-title"><span class="icon">🕐</span> <span class="tip" data-tip="Crontab = 系统级直接执行脚本（零消耗）；Scheduler = 通过 Agent 执行 prompt（消耗对话额度）">定时任务 (${all.length})</span></div>
      <table>
        <tr><th>时间</th><th>任务</th><th>类型</th></tr>
        ${rows || '<tr><td colspan="3" style="color:var(--text-dim)">暂无任务</td></tr>'}
      </table>
    </div>`;
}

function renderScanResultsCard() {
  const r = data.scan_results;
  let rows = '';

  if (r.ada) {
    const badge = r.ada.errors > 0 ? 'badge-yellow' : 'badge-green';
    rows += `<tr><td><span class="tip" data-tip="WCAG 无障碍合规扫描：检查 img alt、表单 label、aria 属性、语义标签等，确保残障用户可正常使用网站">ADA 无障碍</span></td><td><span class="badge ${badge}">${r.ada.errors}错误 / ${r.ada.warnings}警告</span></td><td>${r.ada.files}文件</td><td>${r.ada.time?.split(' ')[0] || ''}</td></tr>`;
  }
  if (r.cwv) {
    const badge = r.cwv.errors > 0 ? 'badge-yellow' : 'badge-green';
    rows += `<tr><td><span class="tip" data-tip="Core Web Vitals 性能扫描：检查影响 LCP/CLS/INP 的代码模式，如 img 缺 width/height、缺 lazy loading、同步 script 等">CWV 性能</span></td><td><span class="badge ${badge}">${r.cwv.errors}错误 / ${r.cwv.warnings}警告</span></td><td>${r.cwv.files}文件</td><td>${r.cwv.time?.split(' ')[0] || ''}</td></tr>`;
  }
  if (r.web_test) {
    const badge = r.web_test.failed > 0 ? 'badge-red' : 'badge-green';
    rows += `<tr><td><span class="tip" data-tip="Playwright 驱动的端到端测试：模拟真实用户操作（首页/搜索/PDP/购物车/个人中心），检查页面是否正常加载">${r.web_test.name}</span></td><td><span class="badge ${badge}">${r.web_test.passed}通过 / ${r.web_test.failed}失败</span></td><td>${r.web_test.total}用例</td><td>${r.web_test.time?.split(' ')[0] || ''}</td></tr>`;
  }
  if (r.git_pull) {
    rows += `<tr><td><span class="tip" data-tip="每天凌晨自动 git pull 所有项目的 master/testing 分支，保持本地代码最新，供扫描和分析使用">代码同步</span></td><td colspan="2">${r.git_pull.summary || ''}</td><td>${r.git_pull.time || ''}</td></tr>`;
  }

  return `
    <div class="card">
      <div class="card-title"><span class="icon">📊</span> 扫描结果</div>
      <table>
        <tr><th>项目</th><th>状态</th><th>规模</th><th>时间</th></tr>
        ${rows || '<tr><td colspan="4" style="color:var(--text-dim)">暂无扫描数据</td></tr>'}
      </table>
    </div>`;
}

function renderZentaoCard() {
  const z = data.zentao;
  const status = z.enabled ? '<span class="badge badge-green">运行中</span>' : '<span class="badge badge-gray">已关闭</span>';
  return `
    <div class="card">
      <div class="card-title"><span class="icon">🐛</span> <span class="tip" data-tip="定期轮询禅道系统，发现新分配给我的 Bug 时自动分析代码定位问题并推送到企微">禅道 Bug 监控</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value">${status}</div>
          <div class="metric-label">状态</div>
        </div>
        <div class="metric">
          <div class="metric-value">${z.poll_count || 0}</div>
          <div class="metric-label"><span class="tip" data-tip="自开启监控以来，已执行的轮询检查次数">轮询次数</span></div>
        </div>
        <div class="metric">
          <div class="metric-value ${z.new_bugs_found > 0 ? 'yellow' : ''}">${z.new_bugs_found || 0}</div>
          <div class="metric-label"><span class="tip" data-tip="本轮监控期间发现的新 Bug 数量（已触发 Agent 分析）">发现新 Bug</span></div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:8px">
        <span class="tip" data-tip="每隔多少秒检查一次禅道是否有新 Bug">间隔: ${z.interval_seconds || 900}s</span> | <span class="tip" data-tip="已记录的 Bug ID 数量，这些 Bug 不会重复推送">已跟踪: ${z.seen_count || 0}个</span> | 上次: ${z.last_poll || '未执行'}
      </div>
    </div>`;
}

function renderDebateCard() {
  const d = data.debate || {};
  const presets = d.presets || [];
  const sessions = d.sessions || [];
  const activeCount = d.active_count || 0;

  let presetRows = presets.map(p => `<tr>
    <td><span class="badge badge-blue">${p.name}</span></td>
    <td style="font-family:monospace;font-size:12px">${p.trigger}</td>
    <td style="font-size:12px;color:var(--text-dim)">${p.desc}</td>
  </tr>`).join('');

  let sessionRows = sessions.map(s => {
    const status = s.running ? '<span class="badge badge-green">进行中</span>' : '<span class="badge badge-gray">已结束</span>';
    return `<tr><td>${s.chatid}</td><td>${s.preset}</td><td>${status}</td><td>${s.turns}轮</td></tr>`;
  }).join('');

  return `
    <div class="card">
      <div class="card-title"><span class="icon">🎭</span> <span class="tip" data-tip="两个独立 Agent 进程辩论，实时推送企微。支持 Code Review、技术决策、需求评审、安全攻防、自由辩论五种场景，各有独立收敛策略">辩论模式</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value ${activeCount > 0 ? 'green' : ''}">${activeCount}</div>
          <div class="metric-label">进行中</div>
        </div>
        <div class="metric">
          <div class="metric-value">${presets.length}</div>
          <div class="metric-label">预设场景</div>
        </div>
      </div>
      <div style="font-size:12px;color:var(--text-dim);margin-top:12px">触发方式（企微发送）</div>
      <table style="margin-top:8px">
        <tr><th>场景</th><th>命令</th><th>说明</th></tr>
        ${presetRows}
      </table>
      <div style="font-size:12px;color:var(--text-dim);margin-top:12px">控制：发「停止辩论」结束 | 辩论中发消息=插话</div>
      ${sessionRows ? `
      <div style="font-size:12px;color:var(--text-dim);margin-top:16px">会话记录</div>
      <table style="margin-top:8px"><tr><th>ChatID</th><th>场景</th><th>状态</th><th>轮次</th></tr>${sessionRows}</table>
      ` : ''}
    </div>`;
}

function renderMemoryCard() {
  const m = data.memory;
  const dbs = m.databases || [];
  let totalEntities = dbs.reduce((s, d) => s + d.entities, 0);
  let totalRelations = dbs.reduce((s, d) => s + d.relations, 0);
  let rows = dbs.map(d => `<tr><td>${d.chatid}</td><td>${d.entities}</td><td>${d.relations}</td></tr>`).join('');
  return `
    <div class="card">
      <div class="card-title"><span class="icon">🧠</span> <span class="tip" data-tip="基于 SQLite 的知识图谱，自动从对话中提取并记住人名、项目、服务、技术决策等信息，跨会话可检索">长期记忆</span></div>
      <div class="metric-row">
        <div class="metric">
          <div class="metric-value green">${totalEntities}</div>
          <div class="metric-label"><span class="tip" data-tip="记住的独立概念节点：人名、项目名、服务名、技术方案、业务术语等">实体总数</span></div>
        </div>
        <div class="metric">
          <div class="metric-value blue">${totalRelations}</div>
          <div class="metric-label"><span class="tip" data-tip="实体之间的关联，如「Alan → 负责 → ec-website-next」「ec-so → 依赖 → central-so」">关系总数</span></div>
        </div>
        <div class="metric">
          <div class="metric-value">${dbs.length}</div>
          <div class="metric-label"><span class="tip" data-tip="每个 chatid（用户/群）拥有独立的记忆数据库，互相隔离">知识库数</span></div>
        </div>
      </div>
      ${rows ? `<table style="margin-top:12px"><tr><th>ChatID</th><th>实体</th><th>关系</th></tr>${rows}</table>` : ''}
    </div>`;
}

function refresh() {
  document.getElementById('statusDot').style.background = 'var(--yellow)';
  fetchData();
}

// 首次加载
fetchData();
// 每 30 秒自动刷新
setInterval(fetchData, 30000);
</script>
</body>
</html>
